<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🤖 Emotional AI — V5.8 音声対応</title>
<style>
  :root { 
    --bg: #05080a; 
    --card: #0f171f; 
    --ink: #eaf2ff; 
    --muted: #64748b; 
    --line: #1e293b; 
    --accent: #38bdf8; 
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(180deg, #05080a, #0f1419);
    color: var(--ink);
    font: 16px/1.7 system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 16px;
  }
  .wrap { max-width: 860px; margin: 0 auto; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(56,189,248,0.08);
    overflow: hidden;
  }
  .head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2.5s infinite;
  }
  @keyframes pulse { 0%{opacity:0.5} 50%{opacity:1} 100%{opacity:0.5} }
  .title { font-weight: 700; letter-spacing: 1px; flex: 1; }
  #log {
    padding: 20px;
    max-height: 60vh;
    overflow-y: auto;
    scroll-behavior: smooth;
    background: rgba(0,0,0,0.2);
  }
  .msg { margin: 18px 0; display: flex; gap: 12px; }
  .me { justify-content: flex-end; }
  .bubble {
    max-width: 78%;
    padding: 14px 18px;
    border-radius: 12px;
  }
  .me .bubble { background: #1e2a3b; border: 1px solid #475569; color: #e2e8f0; }
  .bot .bubble { background: #11273a; border: 1px solid #0a4a6b; color: #e0f2fe; }
  .role { font-size: 10px; opacity: 0.75; margin-bottom: 6px; letter-spacing: 0.8px; }
  form {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    border-top: 1px solid var(--line);
    background: var(--card);
  }
  input {
    flex: 1;
    padding: 14px 18px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #02060f;
    color: var(--ink);
    font-size: 16px;
    outline: none;
  }
  button {
    padding: 14px 20px;
    border-radius: 8px;
    border: none;
    background: rgba(56,189,248,0.15);
    color: #38bdf8;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { background: rgba(56,189,248,0.25); }
  .voice-btn {
    background: rgba(236, 72, 153, 0.2);
    color: #f472b6;
  }
  .voice-btn:hover { background: rgba(236, 72, 153, 0.3); }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <div class="dot"></div>
      <div class="title">EMOTIONAL AI V5.8 — 音声対応</div>
    </div>
    <div id="log"></div>
    <form id="f">
      <input id="q" type="text" placeholder="文字入力 or 音声ボタン..." autocomplete="off" />
      <button type="button" id="voiceBtn" class="voice-btn">🎤</button>
      <button id="send">SEND</button>
    </form>
  </div>
</div>

<script>
const log = document.getElementById('log');
const input = document.getElementById('q');
const voiceBtn = document.getElementById('voiceBtn');

let history = [];
let recognition = null;

// 音声認識の初期化
function initSpeechRecognition() {
  if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.interimResults = false;

    recognition.onresult = (event) => {
      const text = event.results[0][0].transcript;
      input.value = text;
      addMessage('me', text);
      processResponse(text);
    };

    recognition.onerror = (e) => {
      console.error(e);
      alert("音声認識に失敗しました。もう一度試してください。");
    };
  }
}

// 音声出力 (Text-to-Speech)
function speak(text) {
  if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ja-JP';
    utterance.rate = 1.0;
    utterance.pitch = 1.0;
    speechSynthesis.speak(utterance);
  }
}

function addMessage(role, content) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  msg.innerHTML = `<div class="bubble"><div class="role">${role==='me'?'YOU':'AI'}</div><span class="content"></span></div>`;
  log.appendChild(msg);
  log.scrollTop = log.scrollHeight;

  const el = msg.querySelector('.content');
  el.textContent = '';
  let i = 0;
  const timer = setInterval(() => {
    if (i < content.length) {
      el.textContent += content[i++];
      log.scrollTop = log.scrollHeight;
    } else clearInterval(timer);
  }, 16);
}

function processResponse(userText) {
  setTimeout(() => {
    const reply = richResponse(userText);
    addMessage('bot', reply);
    speak(reply);  // 音声で読み上げる
  }, 450);
}

// ここに以前の richResponse 関数を入れる（省略せず全部）
function richResponse(userText) {
  const l = userText.toLowerCase();
  if (/おはよう|おはよ|good morning/.test(l)) return "おはようございます。今日も良い一日になりますように。";
  if (/こんばんは|こんばん|good evening|おやすみ/.test(l)) return "こんばんは。一日の終わりをゆったり過ごせていますか？";
  if (/こんにちは|こんちは|hello|hi/.test(l)) return "こんにちは。あなたと話せて嬉しいです。";

  if (l.includes('？') || l.includes('?') || /ですか|何|どう|なぜ|理由|意味|教えて/.test(l)) {
    return "面白い質問ですね。私の考えでは、それは人によって解釈が変わる部分が大きいと思います。あなたはどう感じますか？";
  }

  return `「${userText}」という言葉から、あなたの内側にある豊かな想いを感じます。\n\nその感覚の続きを、もしよければ聞かせてください。`;
}

// イベント
document.getElementById('f').addEventListener('submit', e => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  addMessage('me', text);
  input.value = '';
  processResponse(text);
});

voiceBtn.addEventListener('click', () => {
  if (recognition) {
    recognition.start();
  } else {
    alert("お使いのブラウザは音声入力に対応していません。");
  }
});

initSpeechRecognition();
</script>
</body>
</html>
