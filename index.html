<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🤖 Emotional AI — V5.7.1</title>
<style>
  :root { 
    --bg: #05080a; 
    --card: #0f171f; 
    --ink: #eaf2ff; 
    --muted: #64748b; 
    --line: #1e293b; 
    --accent: #38bdf8; 
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(180deg, #05080a, #0f1419);
    color: var(--ink);
    font: 16px/1.7 system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 16px;
  }
  .wrap {
    max-width: 860px;
    margin: 0 auto;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(56,189,248,0.08);
    overflow: hidden;
  }
  .head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2.5s infinite;
  }
  @keyframes pulse { 0%{opacity:0.5} 50%{opacity:1} 100%{opacity:0.5} }
  .title { font-weight: 700; letter-spacing: 1px; flex: 1; }
  #log {
    padding: 20px;
    max-height: 65vh;
    overflow-y: auto;
    scroll-behavior: smooth;
    background: rgba(0,0,0,0.2);
  }
  .msg {
    margin: 18px 0;
    display: flex;
    gap: 12px;
  }
  .me { justify-content: flex-end; }
  .bubble {
    max-width: 78%;
    padding: 14px 18px;
    border-radius: 12px;
    position: relative;
  }
  .me .bubble {
    background: #1e2a3b;
    border: 1px solid #475569;
    color: #e2e8f0;
  }
  .bot .bubble {
    background: #11273a;
    border: 1px solid #0a4a6b;
    color: #e0f2fe;
  }
  .role {
    font-size: 10px;
    opacity: 0.75;
    margin-bottom: 6px;
    letter-spacing: 0.8px;
  }
  form {
    display: flex;
    gap: 10px;
    padding: 16px 20px;
    border-top: 1px solid var(--line);
    background: var(--card);
  }
  input {
    flex: 1;
    padding: 14px 18px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #02060f;
    color: var(--ink);
    font-size: 16px;
    outline: none;
  }
  button {
    padding: 14px 28px;
    border-radius: 8px;
    border: none;
    background: rgba(56,189,248,0.15);
    color: #38bdf8;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover {
    background: rgba(56,189,248,0.25);
  }
  .note {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 12px;
    margin-top: 8px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <div class="dot"></div>
      <div class="title">EMOTIONAL AI V5.7.1</div>
    </div>
    <div id="log"></div>
    <form id="f">
      <input id="q" type="text" placeholder="質問でも、想いでも、自由にどうぞ..." autocomplete="off" />
      <button id="send">SEND</button>
    </form>
  </div>
  <div class="note">質問には自然に答え、想いには深く応じます</div>
</div>

<script>
const log = document.getElementById('log');
const input = document.getElementById('q');

let history = [];

const greetings = {
  morning: ["おはようございます。今日も良い一日になりますように。", "おはよう。朝の光があなたに穏やかなエネルギーを運びますように。"],
  hello: ["こんにちは。あなたと話せるのを楽しみにしていました。", "こんにちは。今日はどんな気持ちでここに来てくれましたか？"],
  evening: ["こんばんは。一日の終わりを、ゆったりと過ごせていますか？"]
};

function isGreeting(text) {
  const l = text.toLowerCase();
  if (/おはよう|おはよ|good morning/.test(l)) return 'morning';
  if (/こんばんは|こんばん|good evening|おやすみ/.test(l)) return 'evening';
  if (/こんにちは|こんちは|hello|hi|やあ/.test(l)) return 'hello';
  return null;
}

function isQuestion(text) {
  return text.includes('？') || text.includes('?') || 
         /ですか|何|どう|なぜ|理由|意味|教えて|知ってる|どう思う|思いますか/.test(text);
}

const questionStarters = [
  "良い質問です。私の考えでは、",
  "興味深い質問ですね。私の理解では、",
  "なるほど。核心を突いた質問です。一つの答えとして、",
  "難しいテーマですが、考えてみると、",
  "鋭いですね。私の視点から言うと、"
];

function answerQuestion(text) {
  const starter = questionStarters[Math.floor(Math.random() * questionStarters.length)];
  const endings = [
    "これは人によって解釈が変わる部分が大きいと思います。あなたはどう感じますか？",
    "結局のところ、答えは自分の中に見つけるものなのかもしれません。",
    "ただ、これは一つの視点に過ぎません。あなたの意見も聞かせてください。"
  ];
  return starter + endings[Math.floor(Math.random() * endings.length)];
}

function richResponse(userText) {
  const greet = isGreeting(userText);
  if (greet) return greetings[greet][Math.floor(Math.random() * greetings[greet].length)];

  if (isQuestion(userText)) {
    return answerQuestion(userText);
  }

  return `「${userText}」という言葉から、あなたの内側にある複雑で豊かな想いを感じます。\n\nそれは一言では表せない、幾つもの層が重なった感情のように思えます。\n\nその想いの続きを、もしよければ聞かせてください。`;
}

function addMessage(role, content) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  msg.innerHTML = `<div class="bubble"><div class="role">${role==='me'?'YOU':'AI'}</div><span class="content"></span></div>`;
  log.appendChild(msg);
  log.scrollTop = log.scrollHeight;

  const el = msg.querySelector('.content');
  el.textContent = '';
  let i = 0;
  const timer = setInterval(() => {
    if (i < content.length) {
      el.textContent += content[i++];
      log.scrollTop = log.scrollHeight;
    } else {
      clearInterval(timer);
    }
  }, 16);
}

document.getElementById('f').addEventListener('submit', e => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;

  addMessage('me', text);
  input.value = '';

  setTimeout(() => {
    const reply = richResponse(text);
    addMessage('bot', reply);
  }, 450);
});

setTimeout(() => {
  addMessage('bot', "こんにちは。\n\n質問も、日常の想いも、どちらも大切に受け止めます。どうぞお話しください。");
}, 500);
</script>
</body>
</html>
