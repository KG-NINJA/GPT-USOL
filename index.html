**了解！**  
質問に対する返答パターンを大幅に増やして、より自然で多様な回答になるように調整しました。

以下が**最新版 (V5.7)**です：

```html
<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🤖 Emotional AI — V5.7 多様な知性</title>
<style>
  :root { --bg:#05080a; --card:#0f171f; --ink:#eaf2ff; --muted:#64748b; --line:#1e293b; --accent:#38bdf8; }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#05080a,#0f1419); color:var(--ink); font:16px/1.75 system-ui, -apple-system, sans-serif; padding-bottom:60px;}
  .wrap{max-width:880px;margin:0 auto;padding:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 0 40px rgba(56,189,248,0.08)}
  .head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2.5s infinite}
  @keyframes pulse {0%{opacity:0.4}50%{opacity:1}100%{opacity:0.4}}
  .title{font-weight:700;letter-spacing:1px}
  #log{padding:14px 18px;max-height:68vh;overflow:auto;scroll-behavior:smooth}
  .msg{margin:18px 0;display:flex;gap:14px}
  .me{justify-content:flex-end}
  .bubble{max-width:85%;padding:15px 19px;border-radius:10px;position:relative}
  .me .bubble{background:#1e2a3b;border:1px solid #475569;color:#e2e8f0}
  .bot .bubble{background:#11273a;border:1px solid #0a4a6b;color:#e0f2fe}
  .role{font-size:10px;opacity:0.7;margin-bottom:6px;letter-spacing:1px}
  form{display:flex;gap:10px;padding:14px;border-top:1px solid var(--line)}
  input{flex:1;padding:15px 18px;border-radius:8px;border:1px solid #334155;background:#02060f;color:var(--ink);font-family:inherit;outline:none}
  button{padding:15px 26px;border-radius:8px;border:none;background:rgba(56,189,248,0.12);color:#38bdf8;font-weight:700;cursor:pointer;transition:0.2s}
  button:hover{background:rgba(56,189,248,0.25)}
</style>
</head>
<body>
<div class="wrap card">
  <div class="head">
    <div class="dot"></div>
    <div class="title">EMOTIONAL AI V5.7 — 多様な知性</div>
  </div>
  <div id="log"></div>
  <form id="f">
    <input id="q" type="text" placeholder="何でも質問してください..." autocomplete="off" />
    <button id="send">SEND</button>
  </form>
</div>

<script>
const log = document.getElementById('log');
const input = document.getElementById('q');
let history = [];

const greetings = {
  morning: ["おはようございます。今日も穏やかなスタートが切れますように。", "おはよう。新しい朝の光が、あなたに静かな力を与えてくれます。"],
  hello: ["こんにちは。あなたの存在を感じられて嬉しいです。", "こんにちは。今日はどんな想いでここに来てくれましたか？"],
  evening: ["こんばんは。一日の終わりを、ゆったりと過ごせていますか？", "こんばんは。夜の静けさの中で、あなたの声が響きます。"]
};

function isGreeting(text) {
  const l = text.toLowerCase();
  if (/おはよう|おはよ|good morning/.test(l)) return 'morning';
  if (/こんばんは|こんばん|good evening|おやすみ/.test(l)) return 'evening';
  if (/こんにちは|こんちは|hello|hi|やあ/.test(l)) return 'hello';
  return null;
}

function isQuestion(text) {
  return text.includes('？') || text.includes('?') || 
         /ですか|何|どう|なぜ|理由|意味|教えて|知ってる|思う|思う？|どう思う|何だと思う/.test(text);
}

const questionResponses = [
  "とても興味深い質問ですね。私の理解では、",
  "その問い、核心を突いています。考えてみると、",
  "難しい質問をありがとうございます。私の視点から言うと、",
  "なるほど。それは一筋縄ではいかないテーマです。私の考えでは、",
  "鋭い指摘です。深く掘り下げてみると、",
  "その質問の本質は、",
  "面白い視点ですね。もし私が答えるなら、",
  "完全に答えられるかは分かりませんが、私の見解はこうです。"
];

function answerQuestion(text) {
  const base = questionResponses[Math.floor(Math.random() * questionResponses.length)];
  
  const endings = [
    "状況や文脈によって大きく変わる部分がありますが、あなた自身の感覚が最も大切だと思います。",
    "一つの答えとして、そう捉えられるのではないでしょうか。",
    "ただ、これは私の限られた理解に基づくものです。あなたはどう感じますか？",
    "このテーマは人それぞれ解釈が異なるので、あなたの考えを聞かせていただけると嬉しいです。",
    "結局のところ、答えはあなたの中にこそあるのかもしれません。"
  ];

  return base + endings[Math.floor(Math.random() * endings.length)];
}

function richResponse(userText) {
  const greet = isGreeting(userText);
  if (greet) return greetings[greet][Math.floor(Math.random() * greetings[greet].length)];

  if (isQuestion(userText)) {
    return answerQuestion(userText);
  }

  // 質問以外は詩的・多義的に
  const words = userText.trim();
  return `「${words}」という言葉から、あなたの内側にある複雑で豊かな感情の層を感じ取ります。\n\nそれは一言では表せない、幾つもの想いが交差する場所のようです。\n\nその感覚の続きを、もしよければ聞かせてください。`;
}

function addMessage(role, content, stream = true) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  msg.innerHTML = `<div class="bubble"><div class="role">${role==='me'?'YOU':'AI'}</div><span class="content"></span></div>`;
  log.appendChild(msg);
  log.scrollTop = log.scrollHeight;

  const el = msg.querySelector('.content');
  if (stream) {
    el.textContent = '';
    let i = 0;
    const timer = setInterval(() => {
      if (i < content.length) {
        el.textContent += content[i++];
        log.scrollTop = log.scrollHeight;
      } else clearInterval(timer);
    }, 15);
  } else {
    el.textContent = content;
  }
}

document.getElementById('f').addEventListener('submit', e => {
  e.preventDefault();
  let text = input.value.trim();
  if (!text) return;

  addMessage('me', text, false);
  history.push({role:'me', text});

  input.value = '';

  setTimeout(() => {
    const reply = richResponse(text);
    addMessage('bot', reply, true);
    history.push({role:'bot', text: reply});
  }, 480);
});

setTimeout(() => {
  addMessage('bot', "こんにちは。\n\nあなたの質問も、想いも、どちらも大切に受け止めます。", true);
}, 600);
</script>
</body>
</html>
```

---

これで**質問に対する返答のバリエーション**がかなり増えました。

- 質問 → 多様な導入文 + 自然な締め
- 挨拶 → 専用
- その他 → 詩的

試してみて、もっと変えたい部分があれば教えてください！
