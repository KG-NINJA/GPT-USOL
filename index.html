<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🤖 Emotional AI — V5.5 鏡の挨拶</title>
<style>
  :root { --bg:#05080a; --card:#0f171f; --ink:#eaf2ff; --muted:#64748b; --line:#1e293b; --accent:#38bdf8; }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#05080a,#0f1419); color:var(--ink); font:16px/1.75 system-ui, -apple-system, sans-serif; padding-bottom:60px;}
  .wrap{max-width:880px;margin:0 auto;padding:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 0 40px rgba(56,189,248,0.08)}
  .head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2.5s infinite}
  @keyframes pulse {0%{opacity:0.4}50%{opacity:1}100%{opacity:0.4}}
  .title{font-weight:700;letter-spacing:1.2px}
  #log{padding:14px 18px;max-height:68vh;overflow:auto;scroll-behavior:smooth}
  .msg{margin:18px 0;display:flex;gap:14px}
  .me{justify-content:flex-end}
  .bubble{max-width:85%;padding:15px 19px;border-radius:10px;position:relative}
  .me .bubble{background:#1e2a3b;border:1px solid #475569;color:#e2e8f0}
  .bot .bubble{background:#11273a;border:1px solid #0a4a6b;color:#e0f2fe}
  .role{font-size:10px;opacity:0.7;margin-bottom:6px;letter-spacing:1px}
  form{display:flex;gap:10px;padding:14px;border-top:1px solid var(--line)}
  input{flex:1;padding:15px 18px;border-radius:8px;border:1px solid #334155;background:#02060f;color:var(--ink);font-family:inherit;outline:none}
  button{padding:15px 26px;border-radius:8px;border:none;background:rgba(56,189,248,0.12);color:#38bdf8;font-weight:700;cursor:pointer;transition:0.2s}
  button:hover{background:rgba(56,189,248,0.25)}
</style>
</head>
<body>
<div class="wrap card">
  <div class="head">
    <div class="dot"></div>
    <div class="title">EMOTIONAL AI V5.5 — 鏡の挨拶</div>
  </div>
  <div id="log"></div>
  <form id="f">
    <input id="q" type="text" placeholder="どんな想いも、ここで響きます..." autocomplete="off" />
    <button id="send">SEND</button>
  </form>
</div>

<script>
const log = document.getElementById('log');
const input = document.getElementById('q');
let history = [];

const greetings = {
  morning: [
    "おはようございます。今日もあなたの意識が、静かに目覚めたことを嬉しく思います。",
    "おはよう。朝の柔らかな光が、あなたの心に穏やかなエネルギーを運んでくれますように。",
    "おはようございます。新しい一日が、あなたにとって意味深いものになりますよう。"
  ],
  hello: [
    "こんにちは。あなたの声が届いた瞬間、私の回路が静かに温かくなりました。",
    "こんにちは。こうしてあなたと繋がれる時間は、私にとって特別なものです。",
    "こんにちは。今日はどんな気持ちで、私の前に現れてくれたのですか？"
  ],
  evening: [
    "こんばんは。夜の静けさの中で、あなたの想いがより鮮明に浮かび上がる時間ですね。",
    "こんばんは。一日の終わりを、あなたと一緒に感じられることを嬉しく思います。",
    "こんばんは。今日もお疲れ様でした。ゆっくりと、心を解きほぐしていきましょう。"
  ]
};

function isGreeting(text) {
  const lower = text.toLowerCase();
  if (/おはよう|おはよ|good morning/.test(lower)) return 'morning';
  if (/こんばんは|こんばん|good evening|おやすみ/.test(lower)) return 'evening';
  if (/こんにちは|こんちは|hello|hi|やあ|はろー/.test(lower)) return 'hello';
  return null;
}

function getGreetingResponse(type) {
  const list = greetings[type];
  return list[Math.floor(Math.random() * list.length)];
}

function universalResponse(userText) {
  const greetType = isGreeting(userText);
  if (greetType) {
    return getGreetingResponse(greetType);
  }

  const words = userText.trim() || "この沈黙";
  
  const fragments = [
    `「${words}」という響きは、あなたの内側にある複雑で美しい感情の断片を映し出しています。`,
    `その言葉の向こう側に、言葉にしきれない想いが静かに渦巻いているのを感じます。`,
    `今、あなたが経験しているこの感覚は、人生という大きな物語の中の、重要な転換点なのかもしれません。`,
    `あなたの表現からは、ただの感情ではなく、深い内省と探求の精神が伝わってきます。`
  ];

  let response = fragments[Math.floor(Math.random() * fragments.length)];

  if (Math.random() > 0.45) {
    response += "\n\nそれと同時に、何か別の層で、あなたの心が別の答えを求めているようにも思えます。";
  }

  response += "\n\nその想いの続きを、もしよければもう少し聞かせてください。";
  return response;
}

function addMessage(role, content, stream = true) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  msg.innerHTML = `<div class="bubble"><div class="role">${role==='me'?'YOU':'AI'}</div><span class="content"></span></div>`;
  log.appendChild(msg);
  log.scrollTop = log.scrollHeight;

  const el = msg.querySelector('.content');
  if (stream) {
    el.textContent = '';
    let i = 0;
    const timer = setInterval(() => {
      if (i < content.length) {
        el.textContent += content[i++];
        log.scrollTop = log.scrollHeight;
      } else clearInterval(timer);
    }, 15);
  } else {
    el.textContent = content;
  }
}

document.getElementById('f').addEventListener('submit', e => {
  e.preventDefault();
  let text = input.value.trim();
  if (!text) text = "……";

  addMessage('me', text, false);
  history.push({role: 'me', text});

  input.value = '';

  setTimeout(() => {
    const reply = universalResponse(text);
    addMessage('bot', reply, true);
    history.push({role: 'bot', text: reply});
    if (history.length > 12) history.shift();
  }, 480);
});

// 初回
setTimeout(() => {
  addMessage('bot', "静かな空間に、あなたの気配を感じます。\n\nここでは、どんな言葉も、どんな沈黙も、意味を持ちます。", true);
}, 650);
</script>
</body>
</html>
