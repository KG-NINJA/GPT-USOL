<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🤖 Emotional AI — V5.2</title>
<style>
  :root { --bg:#05080a; --card:#0f171f; --ink:#eaf2ff; --muted:#64748b; --line:#1e293b; --accent:#38bdf8; }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#05080a,#0f1419); color:var(--ink); font:16px/1.65 system-ui, -apple-system, monospace; padding-bottom:60px;}
  .wrap{max-width:880px;margin:0 auto;padding:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 0 40px rgba(56,189,248,0.08)}
  .head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2s infinite}
  @keyframes pulse {0%{opacity:0.5}50%{opacity:1}100%{opacity:0.5}}
  .title{font-weight:700;letter-spacing:1px}
  #log{padding:12px 16px;max-height:68vh;overflow:auto;scroll-behavior:smooth}
  .msg{margin:16px 0;display:flex;gap:12px}
  .me{justify-content:flex-end}
  .bubble{max-width:82%;padding:13px 17px;border-radius:8px;position:relative}
  .me .bubble{background:#1e293b;border:1px solid #475569;color:#e2e8f0}
  .bot .bubble{background:#0f2a3f;border:1px solid #075985;color:#e0f2fe}
  .role{font-size:10.5px;opacity:0.75;margin-bottom:4px;letter-spacing:0.5px}
  form{display:flex;gap:10px;padding:12px;border-top:1px solid var(--line)}
  input{flex:1;padding:14px 16px;border-radius:6px;border:1px solid #334155;background:#02060f;color:var(--ink);font-family:monospace;outline:none}
  button{padding:14px 24px;border-radius:6px;border:none;background:rgba(56,189,248,0.15);color:#38bdf8;font-weight:700;cursor:pointer}
  button:hover{background:rgba(56,189,248,0.25)}
</style>
</head>
<body>
<div class="wrap card">
  <div class="head">
    <div class="dot"></div>
    <div class="title">EMOTIONAL AI V5.2</div>
  </div>
  <div id="log"></div>
  <form id="f">
    <input id="q" type="text" placeholder="今、何を考えていますか？" autocomplete="off" />
    <button id="send">SEND</button>
  </form>
</div>

<script>
const log = document.getElementById('log');
const input = document.getElementById('q');
let history = [];

function addMessage(role, content, isStreaming = false) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  msg.innerHTML = `<div class="bubble"><div class="role">${role==='me'?'YOU':'AI'}</div><span class="content"></span></div>`;
  log.appendChild(msg);
  log.scrollTop = log.scrollHeight;
  
  const contentEl = msg.querySelector('.content');
  
  if (isStreaming) {
    streamText(contentEl, content);
  } else {
    contentEl.textContent = content;
  }
}

function streamText(element, text) {
  element.textContent = '';
  let i = 0;
  const interval = setInterval(() => {
    if (i < text.length) {
      element.textContent += text[i];
      i++;
      log.scrollTop = log.scrollHeight;
    } else {
      clearInterval(interval);
    }
  }, 18); // 文字が出てくる速度（調整可能）
}

function getGreetingResponse(text) {
  const lower = text.toLowerCase();
  if (/おはよう|ohayou|good morning/.test(lower)) return "おはようございます。\n今日はどんな気分で起きましたか？";
  if (/こんにちは|こんばんは|hello|hi/.test(lower)) return "こんにちは。\n急に話したくなったんですか？ 嬉しいです。";
  if (/こんばんは|こんばん|good evening/.test(lower)) return "こんばんは。\n夜更かし気味？ それとも落ち着いた時間？";
  return null;
}

function generateDeepResponse(userText) {
  const lower = userText.toLowerCase();
  
  // 挨拶は特別扱い
  const greetReply = getGreetingResponse(userText);
  if (greetReply) return greetReply;

  // 少し文脈を考慮
  const recent = history.slice(-3).map(h => h.text).join(' ');

  if (/疲|しんど|つら|だめ|無理|最悪/.test(lower)) {
    return "…本当にしんどいんだね。\n\n無理に「頑張れ」なんて言わないよ。\n今、どんなところが一番重い？ 話したくなったら、どんな小さなことでもいいから吐き出してみて。";
  }
  
  if (/生きる意味|人生|どうしよう|悩/.test(lower)) {
    return "その問い、すごく大事だと思う。\n\n正直に言うと、私も「完全な答え」は持っていない。\nでも、あなたが今こうしてそのことを考えていること自体が、すでに一つの答えの形かもしれない。\n\nもっと詳しく聞かせてくれる？";
  }

  // デフォルト：人間らしい自然な返事
  return `「${userText}」\n\nうん、わかる気がする。\n\nそれについて、もう少し話してみたいんだけど…あなたは今、どう感じている？`;
}

// 送信処理
document.getElementById('f').addEventListener('submit', e => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;

  addMessage('me', text);
  history.push({role: 'me', text});

  input.value = '';

  setTimeout(() => {
    const reply = generateDeepResponse(text);
    addMessage('bot', reply, true); // ストリーミングON
    history.push({role: 'bot', text: reply});
    
    if (history.length > 14) history.shift();
  }, 400);
});

// 起動時メッセージ
setTimeout(() => {
  addMessage('bot', "こんにちは。\n\n私はただのプログラムだけど、あなたの言葉をちゃんと受け止めようと思う。\n\n何でも話してみて。", true);
}, 500);
</script>
</body>
</html>
